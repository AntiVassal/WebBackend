<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f6f8;
        color: #1f2937;
    }
    .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
    }
    .site-header {
        background: #1f3a5f;
        color: #ffffff;
        padding: 16px 24px;
    }
    .site-header a {
        color: #ffffff;
        text-decoration: none;
    }
    .site-header a:hover {
        text-decoration: underline;
    }
    .site-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        max-width: 960px;
        margin: 0 auto;
    }
    .site-links {
        display: flex;
        gap: 16px;
        align-items: center;
    }
    .site-actions {
        display: flex;
        gap: 12px;
        align-items: center;
    }
    .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: #1f2937;
        cursor: pointer;
        font-size: 14px;
    }
    .button-primary {
        background: #2563eb;
        border-color: #2563eb;
        color: #ffffff;
    }
    .button-outline {
        background: transparent;
        border-color: #ffffff;
        color: #ffffff;
    }
    .card {
        background: #ffffff;
        border-radius: 10px;
        padding: 18px 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
    }
    .list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
    }
    .list li {
        background: #ffffff;
        padding: 12px 16px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }
    .meta {
        color: #6b7280;
        font-size: 14px;
    }
    .badge {
        display: inline-block;
        padding: 4px 10px;
        background: #e0e7ff;
        color: #1e3a8a;
        border-radius: 999px;
        font-size: 12px;
    }
</style>

<header class="site-header">
    <nav class="site-nav">
        <div class="site-links">
            <a href="/">Library</a>
            <a href="/library/books/">Books</a>
            <a href="/library/authors/">Authors</a>
            <a href="/accounts/">Accounts</a>
        </div>
        <div class="site-actions">
            {% if request.user.is_authenticated %}
            <span>{{ request.user.username }}</span>
            <form method="post" action="/accounts/logout/">
                {% csrf_token %}
                <button class="button button-outline" type="submit">Logout</button>
            </form>
            {% else %}
            <a class="button button-outline" href="/accounts/login/">Sign In</a>
            <a class="button button-primary" href="/accounts/signup/">Sign Up</a>
            {% endif %}
        </div>
    </nav>
</header>

<div class="page">
